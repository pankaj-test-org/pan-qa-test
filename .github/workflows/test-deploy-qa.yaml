name: register-artifact-from-github-test                                                                                                                                                                                                             
on:                                                                                                                                                                                                                                               
    push                                                                                                                                                                                                                                            
jobs:                                                                                                                                                                                                                                             
    register-build-artifact:   
      runs-on: ubuntu-latest
      permissions:                                                                                                                                                                                                                                  
        id-token: write                                                                                                                                                                                                                             
        contents: read                                                                                                                                                                                                                              
      steps:                                                                                                                                                                                                                                        
        - name: Checkout code                                                                                                                                                                                                                       
          uses: actions/checkout@v6                                                                                                                                                                                                                 
        - name: Build                                                                                                                                                                                                                               
          run: |                                                                                                                                                                                                                                    
            sleep 10                                                                                                                                                                                                                                
        - name: Register build artifact                                                                                                                                                                                                             
          id: register-build-artifact                                                                                                                                                                                                               
          uses: cloudbees-io-gha/register-build-artifact@v3                                                                                                                                                                                         
          with:                                                                                                                                                                                                                                     
            cloudbees-url: "https://api.saas-qa.beescloud.com"                                                                                                                                                                                 
            name: h-artifact-gha-0101                                                                                                                                                                                                                 
            url: "https://example.com/h-artifact-gha-0101/1.0.0"                                                                                                                                                                                         
            version: 1.0.1                                                                                                                                                                                                                      
        - name: Print artifact id                                                                                                                                                                                                                   
          run: |                                                                                                                                                                                                                                    
            echo '${{ steps.register-build-artifact.outputs.cbp_artifact_id }}'                                                                                                                                                                     
        - name: Register deployed artifact
          uses: cloudbees-io-gha/register-deployed-artifact@v0
          id: register-deployed-artifact
          with:
            cloudbees-url: "https://api.saas-qa.beescloud.com"
            target-environment: "Production"
            artifact-id: ${{ steps.register-build-artifact.outputs.cbp_artifact_id }}
            labels: "test"  
